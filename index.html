<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pasarela Virtual - Cámara Activa</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="status-tag">Cámara Activa</div>
    </div>

    <div id="controls-panel">
        <button class="action-btn" onclick="console.log('Cambiando modelo...')">Cambio de modelo</button>
        <button class="action-btn" onclick="console.log('Abriendo colores...')">Cambio de color</button>
        <button class="action-btn" onclick="console.log('Guardando captura...')">Guardar</button>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
