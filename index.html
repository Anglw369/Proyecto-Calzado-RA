<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Semana 1: Detección de Cámara y Pie</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script> 
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        video { transform: rotateY(180deg); width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; transform: rotateY(180deg); width: 100%; height: 100%; }
        .status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; z-index: 10; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="status" id="status">Iniciando cámara...</div>
    <div id="canvas-container">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusDiv = document.getElementById('status');

        // Esta función se encarga de dibujar el área detectada
        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusDiv.innerText = "¡Pie/Extremidad Detectada!";
                statusDiv.style.background = "green";
            } else {
                statusDiv.innerText = "Buscando pie...";
                statusDiv.style.background = "red";
            }
            canvasCtx.restore();
        }

        // Configuración de la cámara
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                // Aquí podrías conectar el detector de pies específico
                statusDiv.innerText = "Cámara activa - Buscando coincidencia física";
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
