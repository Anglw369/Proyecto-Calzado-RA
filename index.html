<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RA Calzado - UTL</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        model-viewer { width: 100%; height: 80vh; background-color: #eee; }
        .controls { padding: 20px; display: flex; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <model-viewer id="zapato" src="https://modelviewer.dev/shared-assets/models/MaterialsVariantsShoe.glb" 
                  ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1">
        
        <div class="controls">
            <button onclick="cambiarTinte('red')">Rojo</button>
            <button onclick="cambiarTinte('blue')">Azul</button>
            <button onclick="cambiarTinte('white')">Original</button>
        </div>
    </model-viewer>

    <script>
        const mv = document.querySelector('#zapato');
        async function cambiarTinte(color) {
            // Lógica inicial para el alcance de cambios de textura/color 
            const material = mv.model.materials[0];
            if(color === 'white') {
                material.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]);
            } else if(color === 'red') {
                material.pbrMetallicRoughness.setBaseColorFactor([1, 0, 0, 1]);
            } else {
                material.pbrMetallicRoughness.setBaseColorFactor([0, 0, 1, 1]);
            }
        }
    </script>
</body>
</html>
