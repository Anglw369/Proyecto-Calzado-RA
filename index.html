<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detección de Calzado - UTL</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #ar-ui {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center;
        justify-content: flex-start; pointer-events: none; z-index: 10;
      }
      .instrucciones {
        margin-top: 20px; padding: 10px 20px;
        background: rgba(0,0,0,0.7); color: white;
        border-radius: 20px; font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="ar-ui">
      <div class="instrucciones">Solicitando cámara para detectar pie...</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: true">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0" scale="0.1 0.1 0.1" material="color: blue; opacity: 0.5"></a-box>
      </a-entity>
    </a-scene>

    <script>
      // Forzar el encendido de la cámara si el navegador se queda esperando
      window.addEventListener("load", () => {
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener("arReady", (event) => {
          console.log("MindAR está listo");
        });
      });
    </script>
  </body>
</html>
