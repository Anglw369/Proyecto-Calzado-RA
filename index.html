<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Detección de Calzado - UTL</title>
    <script src="https://appstatic.jeeliz.com/footWidget/jeelizFootWidget.js"></script>
    <style>
        body { margin: 0; background-color: white; }
        #jeelizFootWidgetCanvas {
            position: fixed; width: 100vw; height: 100vh;
            top: 0; left: 0; z-index: 1;
        }
        .info-panel {
            position: absolute; top: 20px; width: 100%; text-align: center;
            z-index: 10; font-family: sans-serif; color: white;
        }
        .badge { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 50px; }
    </style>
</head>
<body onload="init_widget()">
    <div class="info-panel">
        <span class="badge">Buscando pie para calzado virtual...</span>
    </div>
    
    <canvas id='jeelizFootWidgetCanvas'></canvas>

    <script>
        function init_widget() {
            JEELIZFOOTWIDGET.start({
                canvasId: 'jeelizFootWidgetCanvas',
                // Por ahora usamos un modelo genérico mientras tu compañero termina el suyo
                searchImageMask: 'https://appstatic.jeeliz.com/footWidget/searchImageMask.png',
                callbackReady: function(err) {
                    if (err) console.log('Error:', err);
                    console.log('Sistema listo para detectar pies');
                }
            });
        }
    </script>
</body>
</html>
