<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detección de Calzado - UTL</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #mensaje-guia {
        position: absolute; top: 10px; width: 100%; text-align: center;
        color: white; background: rgba(0,0,0,0.5); z-index: 10; padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="mensaje-guia">Apunta la cámara a tu pie para detectar el calzado</div>

    <a-scene mindar-face="autoStart: true" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true">
      
      <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-face-target="anchorIndex: 1">
          <a-box position="0 0 0" scale="0.1 0.1 0.1" material="color: #ff0000; opacity: 0.5"></a-box>
      </a-entity>
      
    </a-scene>
  </body>
</html>
